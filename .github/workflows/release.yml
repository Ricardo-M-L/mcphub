name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build binaries
        run: |
          GOOS=darwin GOARCH=arm64 go build -o dist/mcphub-darwin-arm64 ./cmd/mcphub
          GOOS=darwin GOARCH=amd64 go build -o dist/mcphub-darwin-amd64 ./cmd/mcphub
          GOOS=linux GOARCH=amd64 go build -o dist/mcphub-linux-amd64 ./cmd/mcphub
          GOOS=linux GOARCH=arm64 go build -o dist/mcphub-linux-arm64 ./cmd/mcphub
          GOOS=windows GOARCH=amd64 go build -o dist/mcphub-windows-amd64.exe ./cmd/mcphub

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
